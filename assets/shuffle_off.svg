<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#1A1A1A"/>
  <!-- Obere Linie (ausgegraut) -->
  <line x1="12" y1="65" x2="88" y2="35" stroke="#555555" stroke-width="7" stroke-linecap="round"/>
  <!-- Untere Linie (ausgegraut) -->
  <line x1="12" y1="35" x2="88" y2="65" stroke="#555555" stroke-width="7" stroke-linecap="round"/>
  <!-- Pfeil rechts oben -->
